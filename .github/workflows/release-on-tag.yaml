name: Build with PyInstaller

on:
  push:
    tags:
      - "*"
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile resources
        run: |
          pyside6-rcc --binary assets.qrc -o assets.rcc

      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --icon="assets/icon.ico" \
            --name="Until-Then-PTBR-${{ github.ref_name }}-${{ runner.os }}" \
            --paths="src" \
            --add-data="assets.rcc;." \
            --add-data="config.json;." \
            main.py

      - name: Build Executable (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --icon="assets/icon.ico" \
            --name="Until-Then-PTBR-${{ github.ref_name }}-${{ runner.os }}" \
            --paths="src" \
            --add-data="assets.rcc:." \
            --add-data="config.json:." \
            main.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }} Build
          path: |
            dist/Until-Then-PTBR-${{ github.ref_name }}-${{ runner.os }}.exe
            dist/Until-Then-PTBR-${{ github.ref_name }}-${{ runner.os }}
          include-hidden-files: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/**/Until-Then-PTBR-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
